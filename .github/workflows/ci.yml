name: VOX-Scholar CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-vox-service:
    name: "Job 1 - Test vox_service"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest (if tests exist)
        run: |
          if [ -d "vox_service/tests/" ]; then
            pytest vox_service/tests/
          else
            echo "No tests found in vox_service/tests/ - skipping."
          fi

      - name: Verify Health Endpoint Boots
        run: |
          echo "Starting FastAPI server in background..."
          cd vox_service
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://0.0.0.0:8000/health || exit 1
          pkill uvicorn

  test-scholar-ui:
    name: "Job 2 - Test scholar_ui"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest (if tests exist)
        run: |
          if [ -d "scholar_ui/tests/" ]; then
            pytest scholar_ui/tests/
          else
            echo "No tests found in scholar_ui/tests/ - skipping."
          fi

      - name: Verify SCHOLAR Scanner Imports
        # Verify the scanner can be imported without syntax/dependency errors
        run: |
          cd scholar_ui
          python -c "import scanner; print('Scholar Scanner successfully imported!')"

  integration-check:
    name: "Job 3 - Integration Check (main.py)"
    runs-on: ubuntu-latest
    needs: [test-vox-service, test-scholar-ui]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Edge Router Tests
        # Fails the workflow if any errors occur executing the stub tests in main.py
        run: |
          echo "Running Integration Checks from main.py..."
          python main.py
